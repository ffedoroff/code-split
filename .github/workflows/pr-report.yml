# Posts a sticky code-ranker comment on every PR. If a baseline snapshot exists
# on the base branch (produced by this same workflow's push:main run), the
# comment is a DIFF with a verdict (improved/degraded/neutral) + new violations.
# Before any baseline exists (e.g. main hasn't run this yet), it falls back to a
# REVIEW summary of the current state — same graceful degradation as the GitLab
# / GitHub diff.example.yml. The job is advisory: a fork PR (no write token) or
# any fetch miss never fails it.
name: PR report

on:
  pull_request:
  push:
    branches: [main]   # produces the baseline artifact future PRs diff against

permissions:
  contents: read
  actions: read          # download the base-branch baseline artifact
  pull-requests: write   # post/update the sticky comment

concurrency:
  group: pr-report-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-22.04
    continue-on-error: true   # advisory — never blocks the PR
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Warm the cargo cache (rust plugin runs `cargo metadata --offline`)
        # No prior build/test in this job, so $CARGO_HOME lacks the full dep
        # graph and offline metadata resolution fails (e.g. on a platform-only
        # crate like android_system_properties). Fetch fills the cache first.
        run: cargo fetch --locked

      - name: Analyze -> JSON + HTML snapshot
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          H="$(git rev-parse --short=12 HEAD)"
          BR="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          echo "H=$H" >> "$GITHUB_ENV"
          cargo run -q -p code-ranker -- report . \
            --git.branch="$BR" \
            --git.commit="${PR_HEAD_SHA:-$GITHUB_SHA}" \
            --git.dirty-files=0 \
            --git.origin="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --output.json.path="code-ranker-${H}.json" \
            --output.html.path="code-ranker-${H}.html"

      # Keep the snapshot as an artifact. On main this becomes the baseline that
      # future PRs download; on a PR it's the downloadable full HTML report.
      - name: Upload snapshot
        uses: actions/upload-artifact@v7
        with:
          name: code-ranker-report
          path: |
            code-ranker-*.json
            code-ranker-*.html
          retention-days: 30

      - name: Fetch baseline from the base branch (best-effort)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Latest successful run of THIS workflow on the base branch → its JSON.
          # Any miss → no baseline → review summary; never fails the job.
          set +e
          RID="$(gh run list --branch "$GITHUB_BASE_REF" --workflow "$GITHUB_WORKFLOW" \
                   --status success --limit 1 --json databaseId --jq '.[0].databaseId')"
          if [ -n "$RID" ]; then
            gh run download "$RID" --name code-ranker-report --dir base
          fi
          BASE_JSON="$(ls base/code-ranker-*.json 2>/dev/null | head -n1)"
          echo "BASE_JSON=$BASE_JSON" >> "$GITHUB_ENV"

      - name: Build comment (diff if baseline, else review)
        if: github.event_name == 'pull_request'
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -n "${BASE_JSON:-}" ]; then
            # DIFF: relative gate → verdict + only the NEW violations vs baseline.
            code-ranker check "code-ranker-${H}.json" --baseline "$BASE_JSON" \
              --output-format json > check.json || true
            MODE=diff
          else
            # REVIEW: no baseline yet → absolute current-state violations.
            code-ranker check "code-ranker-${H}.json" --output-format json > check.json || true
            MODE=review
          fi
          MODE="$MODE" RUN_URL="$RUN_URL" BASE_REF="${GITHUB_BASE_REF}" \
            python3 .github/scripts/code_ranker_comment.py > comment.md
          cat comment.md

      - name: Sticky comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: code-ranker
          path: comment.md
