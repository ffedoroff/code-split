name: Publish Docker image
# Manual release step — run via the single "Release (publish everywhere)" button
# (publish.yml) after Verify is green, or on its own. Never auto-publishes on tag.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix), e.g. 1.0.0-alpha.3'
        required: true
        type: string

permissions:
  contents: read
  packages: write    # required to push to ghcr.io

jobs:
  push:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for binaries on GitHub Release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          base="https://github.com/ffedoroff/code-ranker/releases/download/v${v}"
          # The Docker build downloads BOTH linux targets (amd64→x86_64,
          # arm64→aarch64), so wait until both are present — otherwise a
          # multi-arch build races the release upload and 404s on one of them.
          for i in $(seq 1 60); do
            ok=1
            for arch in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
              curl -fsI "${base}/code-ranker-${arch}.tar.xz" > /dev/null 2>&1 || ok=0
            done
            if [ "$ok" = 1 ]; then
              echo "both linux binaries present at $base"; exit 0
            fi
            echo "still waiting for release binaries ($i/60)…"
            sleep 20
          done
          echo "timeout waiting for release binaries"; exit 1

      - name: Compute version and tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"

          hub="fedoroff/code-ranker"
          ghcr="ghcr.io/${owner_lc}/code-ranker"

          tags="${hub}:${v},${ghcr}:${v}"
          if echo "$v" | grep -qE "(alpha|beta|rc)"; then
            tags="${tags},${hub}:alpha,${ghcr}:alpha"
          else
            tags="${tags},${hub}:latest,${hub}:alpha,${ghcr}:latest,${ghcr}:alpha"
          fi

          {
            echo "version=$v"
            echo "tags<<EOF"
            echo "$tags" | tr ',' '\n'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: false
