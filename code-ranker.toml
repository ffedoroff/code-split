# code-ranker.toml — project-level configuration for code-ranker.
# Discovery order: --config PATH > ./code-ranker.toml > <target>/code-ranker.toml >
# Cargo.toml [workspace.metadata.code-ranker]. CLI flags always win over the file.

# Default plugin; overridden by --plugin. `auto` (or unset) → marker detection.
plugin = "rust"

# ── Output artifacts (`report`) ──────────────────────────────────────────────
# One section per format. `path` is a filename template; `enabled` forces the
# format on/off. A `--output.<fmt>.path` flag overrides `path`. Placeholders:
# {project-dir}, {ts}, {git-hash}, {git-hash-N} (first N chars of the commit).
# Built-in defaults if unset: .code-ranker/{ts}-{git-hash-3}.{json,html}.
[output.json]
# path = ".code-ranker/{project-dir}-{ts}.json"
path = ".code-ranker/{project-dir}.json"
# enabled = true

[output.html]
# path = ".code-ranker/{project-dir}-{ts}.html"
path = ".code-ranker/{project-dir}.html"
# enabled = true

# ── Ignore filters (applied before cycles/metrics) ───────────────────────────
[ignore]
# Glob patterns (repo-relative) to drop from the graph.
paths = []
# Skip the language's test files (the plugin decides what counts as a test:
# Rust `#[cfg(test)]` modules, Python `test_*.py`/`tests/`, JS/TS `*.test.*` …).
# On by default — metrics and cycles describe production code. Set false to keep.
tests = true
# Strip crates that appear only in [dev-dependencies].
dev_only_crates = false

# ── Gate rules (`check`) ─────────────────────────────────────────────────────
# Cycle checks per kind: on/off, or an integer budget (max allowed; the N+1-th
# fails). `false` = disabled, `true`/0 = strict, `7` = allow up to 7.
[rules.cycles]
mutual = true
chain = true

# Per-file metric thresholds (the `file` scope is the only one). Values accept
# `_` separators and K/M/G suffixes (e.g. 1_500, 5K, 1.5M). Unset = no limit.
[rules.thresholds.file]
# hk = 150_000
# cyclomatic = 25
# cognitive = 25
# fan_out = 18
# loc = 800
